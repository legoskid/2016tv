<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set innertubeserver</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
}

.box {
  background: #1e1e1e;
  padding: 24px;
  border-radius: 12px;
  width: 320px;
  box-sizing: border-box;
}

input {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  margin-top: 10px;
  margin-bottom: 12px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

.current {
  margin-top: 12px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>
<body>
<div class="box">
  <h2>Set InnerTube Endpoint</h2>

  <input id="value" type="text" placeholder="Enter InnerTube URL">

  <button id="save">Save</button>

  <div class="current" id="current"></div>
</div>

<script>
const input = document.getElementById("value")
const current = document.getElementById("current")

function updateDisplay() {
  const value = localStorage.getItem("innertubeserver")
  current.textContent = "Current Endpoint: " + (value ?? "(not set)")
}

document.getElementById("save").onclick = () => {
  localStorage.setItem("innertubeserver", input.value)
  updateDisplay()
}

const existing = localStorage.getItem("innertubeserver")

if (existing !== null) {
  input.value = existing
}

updateDisplay()
</script>
</body>
</html>
