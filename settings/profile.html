<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Profile</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      width: 350px;
      background: #1b1b1b;
      padding: 20px;
      border-radius: 12px;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    a {
  display: block;
  color: #9ac7ff;
  text-decoration: none;
  margin-top: 12px;
  padding: 10px;
  border-radius: 8px;
  background: #2a2a2a;
}

    a:focus-visible,
    button:focus-visible,
    input:focus-visible {
      outline: 3px solid #6fb1ff;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Profile Settings</h1>

    <label>Profile Image URL</label>
    <input id="profileInput" type="text" placeholder="Enter image URL">

    <label>Name</label>
    <input id="nameInput" type="text" placeholder="Enter name">

    <label>Status</label>
    <input id="statusInput" type="text" placeholder="Enter status">

    <button id="saveButton">Save Profile</button>

    <a href="/">Back to YouTube TV</a>
  </div>

  <script>
    function setupDirectionalNavigation() {
      function getNavItems() {
        return Array.from(
          document.querySelectorAll(
            'a[href], button:not([disabled]), input:not([disabled]), [tabindex]:not([tabindex="-1"])'
          )
        ).filter(el => el.offsetParent !== null)
      }

      function focusByOffset(offset) {
        const items = getNavItems()
        if (items.length === 0) {
          return
        }

        const activeIndex = items.indexOf(document.activeElement)
        const currentIndex = activeIndex === -1 ? 0 : activeIndex
        const nextIndex = (currentIndex + offset + items.length) % items.length
        items[nextIndex].focus()
      }

      document.addEventListener("keydown", event => {
        const key = event.key
        const keyCode = event.keyCode
        const isLeft = key === "ArrowLeft" || keyCode === 37
        const isUp = key === "ArrowUp" || keyCode === 38
        const isRight = key === "ArrowRight" || keyCode === 39
        const isDown = key === "ArrowDown" || keyCode === 40

        if (!isLeft && !isUp && !isRight && !isDown) {
          return
        }

        const target = event.target
        const isTextInput =
          target instanceof HTMLInputElement &&
          (target.type === "text" || target.type === "search" || target.type === "url")

        if (isTextInput && (isLeft || isRight)) {
          return
        }

        event.preventDefault()

        if (isLeft || isUp) {
          focusByOffset(-1)
          return
        }

        focusByOffset(1)
      })

      const initialItems = getNavItems()
      if (initialItems.length > 0) {
        initialItems[0].focus()
      }
    }

    setupDirectionalNavigation()

    const defaultAvatar = "https://tv25.pages.dev/assets/default_pfp.png"

    const profileInput = document.getElementById("profileInput")
    const nameInput = document.getElementById("nameInput")
    const statusInput = document.getElementById("statusInput")
    const saveButton = document.getElementById("saveButton")

    profileInput.value = localStorage.getItem("guide-profile") || defaultAvatar
    nameInput.value = localStorage.getItem("guide-name") || "Guest"
    statusInput.value = localStorage.getItem("guide-status") || "Offline"

    saveButton.onclick = () => {
      localStorage.setItem(
        "guide-profile",
        profileInput.value.trim() || defaultAvatar
      )

      localStorage.setItem(
        "guide-name",
        nameInput.value.trim() || "Guest"
      )

      localStorage.setItem(
        "guide-status",
        statusInput.value.trim() || "Offline"
      )

      alert("Saved")
    }
  </script>
</body>
</html>
